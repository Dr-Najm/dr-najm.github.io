  summary: Senior Lecturer at the Faculty of Manufacturing & Mechatronic Engineering Technology, Universiti Malaysia Pahang Al-Sultan Abdullah (UMPSA). Research focuses on rover locomotion, soft-soil terramechanics, grouser-assisted traction, and HVAC duct inspection robotics. Published 20+ peer-reviewed works with 133 total citations and h-index of 6.

